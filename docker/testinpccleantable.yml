
services:
  tiago_base:
    extends:
      file: .compose_templates.yml
      service: .tiago_sim
    command:
      - bash
      - -c
      - |
        ros2 launch rwu_tiago_bringup sim_robocup_2023.launch.py is_public_sim:=True  x:=-1.451 y:=-5.25 yaw:=1.57 navigation:=True slam:=False map_path:=/maps/myfirstmap.yaml &&
        sleep 25
        ros2 run clean_the_table clean_the_table &&
        
        tail -f /dev/null

  apriltag_detection:
    container_name: my_ros2_apriltag_detection
    extends:
      file: ../submodules/ros-2-apriltags/docker/docker-compose.yml
      service: apriltag_detection
    command:
      - bash
      - -c
      - |
        ros2 run apriltag_ros apriltag_node --ros-args -r image_rect:=/head_front_camera/rgb/image_raw -r camera_info:=/head_front_camera/rgb/camera_info --params-file `ros2 pkg prefix apriltag_ros`/share/apriltag_ros/cfg/tags_36h11.yaml

  tiago_workspace_container:
    extends:
      file: .compose_templates.yml
      service: .tiago_workspace
    image: my_tiago_workspace
    build:
      dockerfile: docker/Dockerfile_workspace
    depends_on:
      - tiago_base
      - apriltag_detection
    command:
      - bash
      - -c
      - |
        sleep 3
        cd /root/ros2_ws/src/nb-246830/models && python3 spawn_objects_clean_table.py && cd &&
        sleep 90
        cd /root/ros2_ws &&
        
        
        tail -f /dev/null



  tiago_workspace_container_1:
    extends:
      file: .compose_templates.yml
      service: .tiago_workspace
    image: my_tiago_workspace
    build:
      dockerfile: docker/Dockerfile_workspace
    command:
      - bash
      - -c
      - |
        source /opt/ros/humble/setup.bash
        cd /root/ros2_ws/
        colcon build
        source install/setup.bash
        sleep 4
        ros2 run clean_the_table clean_the_table &&
            
        tail -f /dev/null
        
  tiago_workspace_conainer_2:
    extends:
      file: .compose_templates.yml
      service: .tiago_workspace
    image: my_tiago_workspace
    build:
      dockerfile: docker/Dockerfile_workspace
    command: 
      - bash
      - -c
      - |

        source /opt/ros/humble/setup.bash
        cd /root/ros2_ws/
        colcon build
        source install/setup.bash

        sleep 1
        ros2 run gazebo_ros spawn_entity.py -entity door -database counter -x -1.50 -y -4.36 -z 0 -Y 0 &&
        sleep 1
        ros2 action send_goal /head_controller/increment teleop_tools_msgs/action/Increment "{increment_by:[0.0,-0.8,0.1]}" &&
        sleep 5
        ros2 run intial_to_goal initial_to_goal &&
        sleep 180

