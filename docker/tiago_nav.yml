services:

  tiago_base:
    extends:
      file: .compose_templates.yml
      service: .tiago_sim
    command: 
      - bash
      - -c
      - |
        tail -f /dev/null&
        ros2 launch rwu_tiago_bringup sim_robocup_2023.launch.py is_public_sim:=True x:=1.0 y:=2.0 yaw:=1.4 navigation:=True slam:=False map_path:=/maps/myfirstmap.yaml 
        tail -f /dev/null